# Tempo single-binary — recebe traces via OTLP gRPC (do collector) e serve lookup ao Grafana.
# Config minima: a imagem nao sobe sem backend de storage e wal definidos.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
