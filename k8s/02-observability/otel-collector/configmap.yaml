apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: fcg
data:
  config.yaml: |
    # OpenTelemetry Collector (contrib) — recebe OTLP dos servicos e roteia telemetria.
    # Traces seguem para o Tempo (OTLP gRPC); metricas sao expostas para scrape do Prometheus.
    # Logs NAO passam por aqui: o identity faz push direto ao Loki (sink Serilog).

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    exporters:
      # Traces -> Tempo, via OTLP gRPC. tls.insecure: comunicacao em texto puro na rede interna.
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      # Metricas -> endpoint /metrics em :8889, que o Prometheus faz scrape (pull).
      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
