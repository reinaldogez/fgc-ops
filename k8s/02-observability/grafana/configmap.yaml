apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: fcg
data:
  datasources.yaml: |
    # Datasources provisionados no boot do Grafana — conectam aos tres backends por nome de servico.
    # Dashboards entram depois; aqui so as fontes de dados (logs, traces, metricas).

    apiVersion: 1

    datasources:
      - name: Loki
        type: loki
        access: proxy
        uid: loki
        url: http://loki:3100

      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://tempo:3200

      - name: Prometheus
        type: prometheus
        access: proxy
        uid: prometheus
        url: http://prometheus:9090
        isDefault: true
