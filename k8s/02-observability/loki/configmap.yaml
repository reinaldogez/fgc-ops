apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: fcg
data:
  loki.yaml: |
    # Loki single-binary — recebe push de logs (sink Serilog do identity) e serve query ao Grafana.
    # Config minima: storage em filesystem local, schema recente (tsdb/v13) exigido pelas versoes atuais.

    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
