apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: fcg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sqlserver-identity 1433; do sleep 2; done']
        - name: wait-for-rabbit
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do sleep 2; done']
      containers:
        - name: identity-api
          image: ghcr.io/reinaldogez/fcg-identity:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: identity-config
            - secretRef:
                name: identity-secret
            - secretRef:
                name: identity-jwt
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
