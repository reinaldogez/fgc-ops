apiVersion: batch/v1
kind: Job
metadata:
  name: identity-migrate
  namespace: fcg
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sqlserver-identity 1433; do sleep 2; done']
      containers:
        - name: migrate
          image: ghcr.io/reinaldogez/fcg-identity:latest
          command: ["dotnet", "Fcg.Identity.Api.dll", "--migrate"]
          envFrom:
            - configMapRef:
                name: identity-config
            - secretRef:
                name: identity-secret
            - secretRef:
                name: identity-jwt
